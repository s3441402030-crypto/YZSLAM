%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. 
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# 相机内参 (修正命名以兼容标准 ORB-SLAM3 解析器)
Camera.fx: 542.822841
Camera.fy: 542.576870
Camera.cx: 315.593520
Camera.cy: 237.756098

# 畸变参数 (RadTan 模型: k1, k2, p1, p2, k3)
Camera.k1: 0.039903
Camera.k2: -0.099343
Camera.p1: -0.000730
Camera.p2: -0.000144
Camera.k3: 0.0

# 图像分辨率
Camera.width: 640
Camera.height: 480

# 帧率 (Bonn 官方标准)
Camera.fps: 30

# 颜色顺序 (1: RGB)
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# RGB-D & Stereo Parameters
#--------------------------------------------------------------------------------------------

# 远近点阈值: 建议设为 50.0 
# 在 YOLO 剔除近处动态点后，提高该值能让系统利用更多背景处的长距离静态特征点
Stereo.ThDepth: 50.0
# Kinect v1 物理基线 (单位: 米)
Stereo.b: 0.075

# 深度图缩放因子 (Bonn/TUM 格式均为 5000.0)
RGBD.DepthMapFactor: 5000.0

#--------------------------------------------------------------------------------------------
# ORB 提取器参数 (针对动态掩码场景优化)
#--------------------------------------------------------------------------------------------

# 每帧提取的特征点数 (2000个是平衡精度与 30FPS 实时性的关键)
ORBextractor.nFeatures: 2000

# 金字塔缩放比例与层数
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8

# FAST 阈值: 将 minThFAST 调低至 5
# 确保在 YSeg-SLAM 的掩码剔除掉大量动态区域后，系统仍能在窄小的背景区域中压榨出足够的点
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 5

#--------------------------------------------------------------------------------------------
# Viewer 可视化参数
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 1.5   # 稍微调小点径，方便在 SCI 论文插图中看清人群缝隙里的静态点
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
