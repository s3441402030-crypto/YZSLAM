%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# 奥比中光 Astra S 官方校准参数（640x480 分辨率）
Camera1.fx: 554.254691191187
Camera1.fy: 554.254691191187
Camera1.cx: 320.5
Camera1.cy: 240.5

# 出厂畸变系数（Astra S 畸变极小，可近似为0）
Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0
Camera1.k3: 0.0

Camera.width: 640
Camera.height: 480

Camera.fps: 30

# 奥比中光输出是 BGR 格式！！！ 这里必须改0
Camera.RGB: 0

# 深度阈值与基线
Stereo.ThDepth: 40.0
Stereo.b: 0.075  # Astra S 基线长度 7.5cm

# ⚠️ 最关键！奥比中光深度图因子是 1000.0，不是TUM的5000.0
RGBD.DepthMapFactor: 1000.0

#--------------------------------------------------------------------------------------------
# ORB Parameters (保持不变即可)
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 2000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters (保持不变即可)
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
